name: CI

on:
  push:
  pull_request:

jobs:
  cli-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check Python syntax
        run: python -m py_compile bin/seqworkflow tests/test_seqworkflow_cli.py
      - name: Run CLI tests
        run: python tests/test_seqworkflow_cli.py
      - name: Check whitespace
        run: git diff --check
