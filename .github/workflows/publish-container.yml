name: Publish Container

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: Container version without the v prefix
        required: true
        default: "1.0.0"

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve version
        id: version
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
        run: |
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=$DISPATCH_VERSION" >> "$GITHUB_OUTPUT"
          fi
      - name: Build and publish linux/amd64 image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: containers/seqworkflows.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/natmurad/seqworkflows:${{ steps.version.outputs.value }}
